<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background: rounded square in Brand-Grün -->
  <rect width="128" height="128" rx="24" ry="24" fill="#005141"/>

  <!-- Hash # (oben-links) in Brand-Orange, leicht italic für Bewegung -->
  <g stroke="#C44E00" stroke-width="9" stroke-linecap="round" fill="none">
    <line x1="40" y1="18" x2="32" y2="68"/>
    <line x1="68" y1="18" x2="60" y2="68"/>
    <line x1="18" y1="34" x2="78" y2="34"/>
    <line x1="16" y1="54" x2="76" y2="54"/>
  </g>

  <!-- Check (unten-rechts) in Weiß -->
  <path d="M 56 90 L 76 112 L 116 64"
        stroke="#FFFFFF" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>
</svg>
